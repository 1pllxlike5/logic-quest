// ==================== EXTREME CHALLENGE MODE ====================
function getExtremeTimer(difficulty) {
  const timers = { 1: 30, 2: 40, 3: 50, 4: 60 };
  return timers[difficulty] || 30;
}

function getExtremeStreakMultiplier(streak) {
  if (streak >= 20) return 5;
  if (streak >= 10) return 3;
  if (streak >= 5) return 2;
  return 1;
}

function generateExtremeQuestion() {
  const pool = getCurrentBank().filter(q => q.type === "choice" || q.type === "fill");
  if (!pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function startExtremeChallenge() {
  const inv = appState.inventory || { shield: 0, extraTime: 0, eliminateWrong: 0 };
  const q = generateExtremeQuestion();
  if (!q) { alert("题库中没有可选题目！"); return; }

  currentSession = {
    type: "extreme",
    lives: 3,
    maxLives: 3,
    streak: 0,
    maxStreak: 0,
    coinsEarned: 0,
    questionsAnswered: 0,
    correctCount: 0,
    wrongQuestions: [],
    currentQuestion: q,
    currentQuestionTimer: getExtremeTimer(q.difficulty),
    startTime: Date.now(),
    shieldActive: false,
    itemsUsed: { shield: 0, extraTime: 0, eliminateWrong: 0 },
    eliminatedOptions: []
  };
  renderExtremeQuestion(currentSession);
}

function renderExtremeQuestion(session) {
  clearInterval(extremeTimerInterval);
  selectedOptionIndex = null;
  const q = session.currentQuestion;
  if (!q) { endExtremeChallenge(); return; }

  const heartsHTML = renderExtremeHearts(session);
  const streakBonus = getExtremeStreakMultiplier(session.streak);
  const inv = appState.inventory || { shield: 0, extraTime: 0, eliminateWrong: 0 };

  // Build HUD HTML
  let html = `<div class="question-area">`;
  html += `
    <div class="challenge-hud">
      <div class="hud-hearts" id="extreme-hearts">${heartsHTML}</div>
      <div class="hud-divider"></div>
      <div class="hud-stat">Q:<span class="hud-val">${session.questionsAnswered + 1}</span></div>
      <div class="hud-divider"></div>
      <div class="hud-stat">⏱<span class="hud-val" id="extreme-timer-text">0:${String(session.currentQuestionTimer).padStart(2,'0')}</span></div>
      <div class="hud-divider"></div>
      <div class="hud-stat"><span id="extreme-streak" class="streak-display">🔥x${session.streak}</span></div>
      <div class="hud-divider"></div>
      <div class="hud-coins">💰+${session.coinsEarned}</div>
    </div>`;

  // Timer bar
  const totalTime = getExtremeTimer(q.difficulty);
  const pct = Math.round((session.currentQuestionTimer / totalTime) * 100);
  let barClass = "safe";
  if (pct <= 10) barClass = "critical urgent-pulse";
  else if (pct <= 25) barClass = "critical";
  else if (pct <= 50) barClass = "danger";
  else if (pct <= 75) barClass = "warning";
  if (session.currentQuestionTimer <= 5) barClass = "critical urgent-pulse";

  html += `<div class="timer-bar-wrap"><div class="timer-bar-fill ${barClass}" id="extreme-timer-bar" style="width:${pct}%;"></div></div>`;

  // Items bar
  html += `<div class="items-bar">
    <button class="item-btn${inv.shield <= 0 ? ' disabled' : ''}" onclick="useExtremeItem('shield')" ${inv.shield <= 0 ? 'disabled' : ''}>
      🛡️ 护盾 <span class="item-count">x${inv.shield}</span>
    </button>
    <button class="item-btn${inv.extraTime <= 0 ? ' disabled' : ''}" onclick="useExtremeItem('extraTime')" ${inv.extraTime <= 0 ? 'disabled' : ''}>
      ⏰ +15s <span class="item-count">x${inv.extraTime}</span>
    </button>
    <button class="item-btn${inv.eliminateWrong <= 0 || q.type !== 'choice' ? ' disabled' : ''}" onclick="useExtremeItem('eliminateWrong')"
      ${inv.eliminateWrong <= 0 || q.type !== 'choice' ? 'disabled' : ''}>
      💡 消错 <span class="item-count">x${inv.eliminateWrong}</span>
    </button>
    ${session.shieldActive ? '<span style="color:var(--accent-cyan);font-size:0.78rem;align-self:center;">🛡️ 护盾生效中</span>' : ''}
  </div>`;

  // Streak bonus indicator
  if (streakBonus > 1) {
    html += `<div style="text-align:center;color:var(--accent-gold);font-size:0.8rem;margin-bottom:8px;">🔥 ${streakBonus}x 金币加成生效中</div>`;
  }

  // Question header
  html += `<div class="question-header">
    <span class="chapter-badge">${q.chapter}</span>
    <span class="diff-stars">${getDifficultyStars(q.difficulty)}</span>
    <span style="color:var(--text-muted);font-size:0.8rem;margin-left:8px;">${getTypeLabel(q.type)}</span>
    <div class="q-text">${q.id}. ${q.question}</div>
  </div>`;

  // Question content
  if (q.type === "choice") {
    html += renderExtremeChoiceQuestion(q, session);
  } else if (q.type === "fill") {
    html += renderFillQuestion(q);
  }

  // Action buttons
  html += `<div class="question-actions">
    <button class="btn btn-pink btn-lg" style="flex:1;justify-content:center;" onclick="submitAnswer()">✓ 提交答案</button>
    <button class="btn btn-outline btn-sm" onclick="toggleFavorite(${q.id})" title="收藏">
      ${appState.favorites.includes(q.id) ? "⭐ 已收藏" : "☆ 收藏"}
    </button>
  </div>`;

  html += `</div>`;
  document.getElementById("main-content").innerHTML = html;

  // Start per-question timer
  startExtremeTimer(session);
}

function renderExtremeChoiceQuestion(q, session) {
  const elim = session.eliminatedOptions || [];
  let html = `<div class="options-list" id="options-container">`;
  q.options.forEach((opt, idx) => {
    if (elim.includes(idx)) {
      html += `<div class="option-item" style="opacity:0.2;pointer-events:none;">
        <span class="option-marker">${String.fromCharCode(65 + idx)}</span>
        <span>${opt}</span>
      </div>`;
    } else {
      html += `<div class="option-item" data-opt="${idx}" onclick="selectOption(this, ${idx})">
        <span class="option-marker">${String.fromCharCode(65 + idx)}</span>
        <span>${opt}</span>
      </div>`;
    }
  });
  html += `</div>`;
  return html;
}

function renderExtremeHearts(session) {
  let html = '';
  for (let i = 0; i < session.maxLives; i++) {
    if (i < session.lives) {
      html += `<span class="hud-heart">♥</span>`;
    } else {
      html += `<span class="hud-heart broken">💔</span>`;
    }
  }
  return html;
}

function startExtremeTimer(session) {
  clearInterval(extremeTimerInterval);
  const totalTime = getExtremeTimer(session.currentQuestion.difficulty);
  session.currentQuestionTimer = totalTime;

  extremeTimerInterval = setInterval(() => {
    session.currentQuestionTimer--;

    // Update timer text
    const timerText = document.getElementById("extreme-timer-text");
    if (timerText) {
      const m = Math.floor(session.currentQuestionTimer / 60);
      const s = session.currentQuestionTimer % 60;
      timerText.textContent = `${m}:${String(s).padStart(2, '0')}`;
    }

    // Update timer bar
    const timerBar = document.getElementById("extreme-timer-bar");
    if (timerBar) {
      const pct = Math.max(0, Math.round((session.currentQuestionTimer / totalTime) * 100));
      timerBar.style.width = pct + "%";
      timerBar.classList.remove("safe", "warning", "danger", "critical", "urgent-pulse");
      if (pct <= 10 || session.currentQuestionTimer <= 5) {
        timerBar.classList.add("critical", "urgent-pulse");
      } else if (pct <= 25) {
        timerBar.classList.add("critical");
      } else if (pct <= 50) {
        timerBar.classList.add("danger");
      } else if (pct <= 75) {
        timerBar.classList.add("warning");
      } else {
        timerBar.classList.add("safe");
      }
    }

    if (session.currentQuestionTimer <= 0) {
      clearInterval(extremeTimerInterval);
      handleExtremeTimeout();
    }
  }, 1000);
}

function handleExtremeTimeout() {
  if (!currentSession || currentSession.type !== "extreme") return;
  const q = currentSession.currentQuestion;
  // Time out: lose 1 life, reset streak
  currentSession.streak = 0;
  currentSession.wrongQuestions.push(q.id);
  addToWrongBook(q.id);
  updateDailyTasks(q, false);
  saveState();

  triggerHeartBreakAnimation();
  setTimeout(() => {
    if (!currentSession || currentSession.type !== "extreme") return;
    currentSession.lives--;
    if (currentSession.lives <= 0) {
      if (!tryReviveAndContinue()) endExtremeChallenge();
    } else {
      currentSession.shieldActive = false;
      currentSession.eliminatedOptions = [];
      currentSession.currentQuestion = generateExtremeQuestion();
      currentSession.questionsAnswered++;
      renderExtremeQuestion(currentSession);
    }
  }, 600);
}

function submitExtremeAnswer() {
  if (!currentSession || currentSession.type !== "extreme") return;
  clearInterval(extremeTimerInterval);
  const q = currentSession.currentQuestion;
  let userAnswer = null;
  let isCorrect = false;

  switch (q.type) {
    case "choice":
      if (selectedOptionIndex === null) { alert("请先选择一个选项！"); startExtremeTimer(currentSession); return; }
      userAnswer = selectedOptionIndex;
      isCorrect = selectedOptionIndex === q.answer;
      showChoiceResult(q);
      break;
    case "fill":
      const fillInputs = document.querySelectorAll(".fill-input");
      userAnswer = Array.from(fillInputs).map(inp => inp.value.trim());
      isCorrect = checkFillAnswer(q, userAnswer);
      break;
    default:
      return;
  }

  if (isCorrect === true) {
    // Correct answer
    currentSession.streak++;
    currentSession.maxStreak = Math.max(currentSession.maxStreak, currentSession.streak);
    currentSession.correctCount++;
    const multiplier = getExtremeStreakMultiplier(currentSession.streak);
    const earnedThisQ = 10 * multiplier;
    currentSession.coinsEarned += earnedThisQ;

    playSound('correct');
    showCoinAnimation(earnedThisQ);
    // Flash effect
    const qa = document.querySelector('.question-area');
    if (qa) { qa.classList.add('correct-flash'); setTimeout(() => qa.classList.remove('correct-flash'), 600); }

    // Record answer time for speed-demon achievement
    const answerTime = Math.round((Date.now() - (currentSession.lastAnswerTime || currentSession.startTime)) / 1000);
    appState.lastQuestionAnswerTime = answerTime;
    currentSession.lastAnswerTime = Date.now();
    saveState();

    // Check streak milestones for visual feedback
    if (currentSession.streak === 5 || currentSession.streak === 10 || currentSession.streak === 20) {
      showStreakMilestone(currentSession.streak);
      showToast("🔥 x" + currentSession.streak + " 连击! " + multiplier + "倍金币!");
    }

    // Update daily tasks
    updateDailyTasks(q, true);
  } else {
    // Wrong answer
    currentSession.wrongQuestions.push(q.id);
    addToWrongBook(q.id);
    updateDailyTasks(q, false);

    playSound('wrong');
    if (q.type === 'choice' && selectedOptionIndex !== null) {
      const items = document.querySelectorAll('.option-item');
      items.forEach((item, idx) => {
        if (idx === selectedOptionIndex) item.classList.add('shake');
      });
    }

    if (currentSession.shieldActive) {
      // Shield absorbs the life loss, but streak still resets
      currentSession.shieldActive = false;
      currentSession.streak = 0;
    } else {
      triggerHeartBreakAnimation();
      setTimeout(() => {
        if (!currentSession || currentSession.type !== "extreme") return;
        currentSession.lives--;
        currentSession.streak = 0;
        saveState();
        if (currentSession.lives <= 0) {
          if (!tryReviveAndContinue()) endExtremeChallenge();
        } else {
          nextExtremeQuestion();
        }
      }, 600);
      showExplanation(q);
      return;
    }
  }

  showExplanation(q);
  setTimeout(() => {
    if (currentSession && currentSession.type === "extreme") {
      nextExtremeQuestion();
    }
  }, 1500);
}

function nextExtremeQuestion() {
  if (!currentSession || currentSession.type !== "extreme") return;
  currentSession.questionsAnswered++;
  currentSession.shieldActive = currentSession.shieldActive || false;
  currentSession.eliminatedOptions = [];
  const q = generateExtremeQuestion();
  if (!q) { endExtremeChallenge(); return; }
  currentSession.currentQuestion = q;
  saveState();
  renderExtremeQuestion(currentSession);
}

function useExtremeItem(itemType) {
  if (!currentSession || currentSession.type !== "extreme") return;
  const inv = appState.inventory || { shield: 0, extraTime: 0, eliminateWrong: 0 };

  switch (itemType) {
    case "shield":
      if (inv.shield <= 0) return;
      inv.shield--;
      currentSession.shieldActive = true;
      currentSession.itemsUsed.shield = (currentSession.itemsUsed.shield || 0) + 1;
      break;
    case "extraTime":
      if (inv.extraTime <= 0) return;
      inv.extraTime--;
      currentSession.currentQuestionTimer += 15;
      currentSession.itemsUsed.extraTime = (currentSession.itemsUsed.extraTime || 0) + 1;
      // Update timer display immediately
      const timerText = document.getElementById("extreme-timer-text");
      if (timerText) {
        const m = Math.floor(currentSession.currentQuestionTimer / 60);
        const s = currentSession.currentQuestionTimer % 60;
        timerText.textContent = `${m}:${String(s).padStart(2, '0')}`;
      }
      break;
    case "eliminateWrong":
      if (inv.eliminateWrong <= 0) return;
      if (currentSession.currentQuestion.type !== "choice") return;
      inv.eliminateWrong--;
      currentSession.itemsUsed.eliminateWrong = (currentSession.itemsUsed.eliminateWrong || 0) + 1;
      // Eliminate 2 wrong options
      const q = currentSession.currentQuestion;
      const wrongIndices = q.options.map((_, idx) => idx).filter(idx => idx !== q.answer);
      const toElim = shuffleArray(wrongIndices).slice(0, 2);
      currentSession.eliminatedOptions = toElim;
      break;
  }

  appState.inventory = inv;
  saveState();
  renderExtremeQuestion(currentSession);
}

function triggerHeartBreakAnimation() {
  const heartsContainer = document.getElementById("extreme-hearts");
  if (!heartsContainer) return;
  const hearts = heartsContainer.querySelectorAll(".hud-heart:not(.broken)");
  if (hearts.length > 0) {
    const lastHeart = hearts[hearts.length - 1];
    lastHeart.classList.add("breaking");
  }
}

function showStreakMilestone(streak) {
  const streakEl = document.getElementById("extreme-streak");
  if (streakEl) {
    streakEl.classList.add("streak-milestone", "milestone");
    setTimeout(() => {
      streakEl.classList.remove("streak-milestone", "milestone");
    }, 600);
  }
}

function endExtremeChallenge() {
  clearInterval(extremeTimerInterval);
  if (!currentSession || currentSession.type !== "extreme") return;
  const session = currentSession;

  // Award coins
  const totalCoins = session.coinsEarned || 0;
  const totalAnswered = (session.questionsAnswered || 0) + 1; // include current question
  updateState({ sharedCoins: appState.sharedCoins + totalCoins });

  // Consume used items from inventory
  if (!appState.inventory) appState.inventory = { shield: 2, extraTime: 1, eliminateWrong: 0 };

  // Save to extremeRecords
  const record = {
    date: new Date().toLocaleDateString("zh-CN"),
    isoDate: new Date().toISOString(),
    score: totalAnswered,
    maxStreak: session.maxStreak || 0,
    correctCount: session.correctCount || 0,
    time: Math.round((Date.now() - session.startTime) / 1000),
    coins: totalCoins
  };
  if (!appState.extremeRecords) appState.extremeRecords = [];
  appState.extremeRecords.push(record);

  // Update global stats
  updateState({
    totalAnswered: appState.totalAnswered + totalAnswered,
    totalCorrect: appState.totalCorrect + (session.correctCount || 0),
    timeSpentToday: (appState.timeSpentToday || 0) + record.time,
    lastActiveDate: new Date().toDateString(),
    streak: updateStreak()
  });

  // Save completed session
  appState.completedSessions.push({
    date: new Date().toISOString(),
    type: "extreme",
    totalQuestions: totalAnswered,
    correct: session.correctCount || 0,
    score: totalAnswered,
    timeSpent: record.time
  });

  // Check achievements (unlucky=13, streak-50, etc.)
  checkAchievements();

  saveState();
  document.getElementById("main-content").innerHTML = renderExtremeGameOver(session);
  currentSession = null;
}

function renderExtremeGameOver(session) {
  const records = (appState.extremeRecords || []).slice().sort((a, b) => b.score - a.score);
  const top3 = records.slice(0, 3);
  const thisScore = (session.questionsAnswered || 0) + 1;
  const isNewRecord = records.length > 0 && thisScore >= records[0].score && (session.questionsAnswered || 0) >= 0;
  const totalCoins = session.coinsEarned || 0;
  const timeSpent = Math.round((Date.now() - session.startTime) / 1000);
  const formatTimeShort = (sec) => {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  };

  let leaderboardHTML = '';
  if (!top3.length) {
    leaderboardHTML = '<p style="color:var(--text-muted);">暂无记录</p>';
  } else {
    leaderboardHTML = top3.map((r, i) => {
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
      const isYou = r.isoDate.substring(0, 10) === new Date().toISOString().substring(0, 10) && r.score === thisScore;
      return `<div class="lb-row">
        <span class="lb-rank">${medal}</span>
        <span style="flex:1;"><span class="${isYou ? 'lb-you' : 'lb-score'}">${r.score}题</span>
        ${isYou ? '<span class="lb-you-tag">你</span>' : ''}
        <span class="lb-date">${r.date}</span></span>
        <span style="color:var(--text-muted);font-size:0.75rem;">🔥x${r.maxStreak || 0}</span>
      </div>`;
    }).join('');
  }

  // Filter to just this round's wrong questions
  const thisRoundWrongIds = [...new Set(session.wrongQuestions || [])];
  const wrongHTML = thisRoundWrongIds.length > 0
    ? thisRoundWrongIds.map(id => `Q${id}`).join(', ')
    : '无';

  return `
  <div class="extreme-gameover">
    <div class="ego-icon">⚡</div>
    <div class="ego-title">挑战结束！</div>
    ${isNewRecord ? '<div class="ego-record">🏆 本轮最佳！新纪录！</div>' : ''}

    <div class="ego-lb">
      <h4>📊 排名</h4>
      ${leaderboardHTML}
    </div>

    <div class="ego-stats">
      <div class="ego-stat">
        <div class="ego-sval" style="color:var(--color-correct);">${session.correctCount || 0}</div>
        <div class="ego-slabel">正确</div>
      </div>
      <div class="ego-stat">
        <div class="ego-sval" style="color:var(--color-streak);">x${session.maxStreak || 0}</div>
        <div class="ego-slabel">最高连击</div>
      </div>
      <div class="ego-stat">
        <div class="ego-sval">${formatTimeShort(timeSpent)}</div>
        <div class="ego-slabel">用时</div>
      </div>
      <div class="ego-stat">
        <div class="ego-sval" style="color:var(--accent-gold);">${totalCoins} 💰</div>
        <div class="ego-slabel">获得金币</div>
      </div>
    </div>

    <div class="ego-wrong-list">
      <h4>❌ 答错题目</h4>
      <span>${wrongHTML}</span>
    </div>

    ${((appState.inventory && appState.inventory.revive > 0) || (currentSession && currentSession.type === 'extreme')) ? `
    <div style="margin-bottom:16px;text-align:center;">
      ${(appState.inventory && appState.inventory.revive > 0) ? `<button class="btn btn-cyan" onclick="reviveFromGameOver()">🔄 使用复活卡 (x${appState.inventory.revive})</button>` : ''}
    </div>` : ''}
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-pink" onclick="startExtremeChallenge()">🔄 再来一局</button>
      <button class="btn btn-outline" onclick="reviewWrongAnswers()">📝 查看错题</button>
      <button class="btn btn-outline" onclick="navigateTo('home')">🏠 返回首页</button>
    </div>
  </div>`;
}

function reviveFromGameOver() {
  const inv = appState.inventory || {};
  if ((inv.revive || 0) <= 0) { showToast("没有复活卡！请前往商店购买"); return; }
  if (!confirm(`使用一张复活卡重新挑战？\n剩余: ${inv.revive} 张`)) return;
  inv.revive--;
  appState.inventory = inv;
  saveState();
  updateTopbar();
  showToast("🔄 复活！重新挑战");
  startExtremeChallenge();
}

function tryReviveAndContinue() {
  if (!currentSession || currentSession.type !== "extreme") return false;
  const inv = appState.inventory || {};
  if ((inv.revive || 0) <= 0) return false;
  if (!confirm(`是否使用一张复活卡继续挑战？\n剩余复活卡: ${inv.revive} 张`)) return false;
  inv.revive--;
  appState.inventory = inv;
  currentSession.lives = 1;
  currentSession.shieldActive = false;
  currentSession.eliminatedOptions = [];
  currentSession.currentQuestion = generateExtremeQuestion();
  currentSession.questionsAnswered++;
  saveState();
  renderExtremeQuestion(currentSession);
  showToast("🔄 复活成功！继续挑战");
  return true;
}

function abandonChallenge(targetPage) {
  if (!confirm("确定要放弃当前挑战吗？进度将丢失。")) return;
  clearInterval(extremeTimerInterval);
  // Any coins earned so far are forfeited
  currentSession = null;
