  </div>`;
}

function getTodayStats() {
  const today = new Date().toDateString();
  const timeSpent = appState.timeSpentToday || 0;

  // Always count questions from sessions completed today
  const answered = appState.completedSessions
    .filter(s => new Date(s.date).toDateString() === today)
    .reduce((sum, s) => sum + s.totalQuestions, 0);

  return { answered, timeSpent };
}

// ==================== SESSION MANAGEMENT ====================
let currentSession = null;

function buildQuestionList(type, mode, count) {
  let pool = [...getCurrentBank()];
  if (type !== "all") {
    pool = pool.filter(q => q.type === type);
  }
  if (pool.length === 0) return [];

  if (mode === "random") {
    pool = shuffleArray(pool);
  }
  return pool.slice(0, Math.min(count, pool.length));
}

function startQuickSession() {
  const type = document.getElementById("qs-type").value;
  const mode = document.getElementById("qs-mode").value;
  const count = parseInt(document.getElementById("qs-count").value);
  const questions = buildQuestionList(type, mode, count);
  if (questions.length === 0) { alert("没有符合条件的题目！"); return; }

  currentSession = {
    questions,
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "quick"
  };
  renderQuestion(currentSession);
}

function startLevelsSession() {
  // Sort questions by chapter and difficulty
  const questions = [...getCurrentBank()].sort((a,b) => {
    const chIdxA = getCurrentChapters().findIndex(c => c.questionIds.includes(a.id));
    const chIdxB = getCurrentChapters().findIndex(c => c.questionIds.includes(b.id));
    if (chIdxA !== chIdxB) return chIdxA - chIdxB;
    return a.difficulty - b.difficulty;
  });
  currentSession = {
    questions,
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "levels"
  };
  renderQuestion(currentSession);
}

function startChallengeSession() {
  navigateTo("challenge");
}

function startExamSession() {
  const choiceQs = shuffleArray(getCurrentBank().filter(q => q.type === "choice")).slice(0, 20);
  const fillQs = shuffleArray(getCurrentBank().filter(q => q.type === "fill")).slice(0, 4);
  const shortQs = shuffleArray(getCurrentBank().filter(q => q.type === "short")).slice(0, 2);
  const compQs = shuffleArray(getCurrentBank().filter(q => q.type === "comprehensive")).slice(0, 2);
  const codeQs = shuffleArray(getCurrentBank().filter(q => q.type === "code")).slice(0, 2);
  const questions = shuffleArray([...choiceQs, ...fillQs, ...shortQs, ...compQs, ...codeQs]);

  currentSession = {
    questions,
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "exam",
    totalTime: 60 * 60 // 60 minutes
  };
  renderQuestion(currentSession);
}

function startChapterSession(chapterId) {
  const chapter = getChapterById(chapterId);
  if (!chapter) return;
  const questions = chapter.questionIds
    .map(id => getQuestionById(id))
    .filter(q => q);
  currentSession = {
    questions,
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "chapter",
    chapterId
  };
  renderQuestion(currentSession);
}

function resumeSession() {
  if (!appState.pendingSession) return;
  currentSession = appState.pendingSession;
  appState.pendingSession = null;
  saveState();
  renderQuestion(currentSession);
}

// ==================== LEVEL SESSION ====================
let levelTimerInterval = null;

function startLevelSession(levelId) {
  const found = findLevel(levelId);
  if (!found) return;
  const { chapterId, level } = found;
  const questions = level.questionIds
    .map(id => getQuestionById(id))
    .filter(q => q);

  if (!questions.length) { alert("该关卡没有题目！"); return; }

  currentSession = {
    questions: shuffleArray(questions),
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "level",
    levelId,
    chapterId,
    levelName: level.name,
    timeLimit: level.timeLimit,
    timeRemaining: level.timeLimit
  };

  renderQuestion(currentSession);
}

function startLevelTimer() {
  clearInterval(levelTimerInterval);
  if (!currentSession || currentSession.type !== "level") return;

  levelTimerInterval = setInterval(() => {
    if (!currentSession || currentSession.type !== "level") {
      clearInterval(levelTimerInterval);
      return;
    }
    const elapsed = Math.floor((Date.now() - currentSession.startTime) / 1000);
    currentSession.timeRemaining = Math.max(0, currentSession.timeLimit - elapsed);

    const timerEl = document.getElementById("level-timer");
    if (timerEl) {
      const m = Math.floor(currentSession.timeRemaining / 60);
      const s = currentSession.timeRemaining % 60;
      timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
      if (currentSession.timeRemaining <= 30) {
        timerEl.classList.add("urgent");
      } else {
        timerEl.classList.remove("urgent");
      }
    }

    if (currentSession.timeRemaining <= 0) {
      clearInterval(levelTimerInterval);
      timeUpAutoSubmit();
    }
  }, 1000);
}

function timeUpAutoSubmit() {
  if (!currentSession || currentSession.type !== "level") return;
  const qId = currentSession.questions[currentSession.currentIndex].id;
  currentSession.answers[currentSession.currentIndex] = {
    questionId: qId,
    userAnswer: null,
    isCorrect: false
  };
  addToWrongBook(qId);
  advanceQuestion();
}

function renderLevelResult(session, score, correct, total, timeSpent) {
  const stars = getStarRating(score);
  const coinsEarned = stars * 30 + correct * 5;
  updateState({ sharedCoins: appState.sharedCoins + coinsEarned });
  saveLevelProgress(session.levelId, stars, score);

  // Check achievements after level completes (for three-star, first-level, etc.)
  checkAchievements();

  const starsDisplay = '⭐'.repeat(stars) + '☆'.repeat(Math.max(0, 3 - stars));
  const starLabel = stars >= 3 ? '⭐⭐⭐ 完美通关！' : stars >= 2 ? '⭐⭐ 优秀通关！' : stars >= 1 ? '⭐ 合格通关！' : '未通过...';
  const emoji = stars >= 3 ? '🏆' : stars >= 2 ? '🎉' : stars >= 1 ? '💪' : '📚';
  const nextLevelId = getNextLevelId(session.levelId);

  return `
  <div class="level-result">
    <div class="lr-icon">${emoji}</div>
    <div class="lr-title">🎉 关卡完成！</div>
    <div class="lr-stars">${starsDisplay}</div>
    <div style="font-size:1.1rem;color:var(--accent-gold);margin-bottom:16px;">${starLabel}</div>
    <div class="lr-stats">
      <div class="lr-stat">
        <div class="lr-val" style="color:var(--color-correct);">${correct}/${total}</div>
        <div class="lr-label">正确率</div>
      </div>
      <div class="lr-stat">
        <div class="lr-val">${score}%</div>
        <div class="lr-label">得分</div>
      </div>
      <div class="lr-stat">
        <div class="lr-val">${formatTime(timeSpent)}</div>
        <div class="lr-label">用时</div>
      </div>
      <div class="lr-stat">
        <div class="lr-val" style="color:var(--accent-gold);">+${coinsEarned} 💰</div>
        <div class="lr-label">获得金币</div>
      </div>
    </div>
    <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-cyan" onclick="startLevelSession('${session.levelId}')">🔄 重试</button>
      ${nextLevelId ? `<button class="btn btn-primary" onclick="startLevelSession('${nextLevelId}')">▶ 下一关</button>` : ''}
      <button class="btn btn-outline" onclick="navigateTo('levels')">🗺 返回地图</button>
    </div>
  </div>`;
}

// ==================== QUESTION RENDERING ====================
function renderQuestion(session) {
  if (session.type === "extreme") {
    renderExtremeQuestion(session);
    return;
  }
  if (session.currentIndex >= session.questions.length) {
    showResults(session);
    return;
  }

  selectedOptionIndex = null;
  answerSubmitted = false;

  const q = session.questions[session.currentIndex];
  const progressPct = Math.round(((session.currentIndex) / session.questions.length) * 100);

  let html = `<div class="question-area">`;

  // Session header
  html += `
    <div class="session-header">
      <div class="session-title">${getSessionTitle(session)}</div>
      <div class="session-progress">第 ${session.currentIndex + 1}/${session.questions.length} 题</div>
    </div>
    <div class="progress-bar" style="margin-bottom:20px;">
      <div class="fill" style="width:${progressPct}%;"></div>
    </div>`;

  // Challenge timer
  if (session.type === "challenge") {
    html += `<div style="text-align:right;color:var(--accent-pink);margin-bottom:12px;font-size:1.1rem;">
      ⏱ <span id="challenge-timer">${session.timer || 30}</span>s | 🔥 连击: ${session.streak || 0}
    </div>`;
  }

  // Level session UI: info bar + progress dots
  if (session.type === "level") {
    const m = Math.floor(session.timeRemaining / 60);
    const s = Math.floor(session.timeRemaining % 60);
    html += `<div class="level-info-bar">
      <span class="li-name">${session.levelName || ''}</span>
      <span class="li-timer${session.timeRemaining <= 30 ? ' urgent' : ''}" id="level-timer">${m}:${String(s).padStart(2, '0')}</span>
      <span class="li-progress">${session.currentIndex + 1}/${session.questions.length}</span>
      <span class="li-target">🎯 目标 ⭐⭐⭐</span>
    </div>`;
    // Progress dots
    html += `<div class="progress-dots">`;
    for (let i = 0; i < session.questions.length; i++) {
      let dotClass = 'pdot';
      if (i < session.currentIndex) {
        const ans = session.answers[i];
        if (ans && ans.isCorrect === true) dotClass += ' done';
        else if (ans && ans.isCorrect === false) dotClass += ' wrong-dot';
        else dotClass += ' done';
      } else if (i === session.currentIndex) {
        dotClass += ' current';
      }
      html += `<span class="${dotClass}"></span>`;
    }
    html += `</div>`;
  }

  // Question header
  html += `
    <div class="question-header">
      <span class="chapter-badge">${q.chapter}</span>
      <span class="diff-stars">${getDifficultyStars(q.difficulty)}</span>
      <span style="color:var(--text-muted);font-size:0.8rem;margin-left:8px;">${getTypeLabel(q.type)}</span>
      <div class="q-text">${q.id}. ${q.question}</div>
    </div>`;

  // Render based on type
  switch(q.type) {
    case "choice":
      html += renderChoiceQuestion(q);
      break;
    case "tf":
      html += renderTFQuestion(q);
      break;
    case "fill":
      html += renderFillQuestion(q);
      break;
    case "short":
      html += renderShortQuestion(q);
      break;
    case "comprehensive":
      html += renderComprehensiveQuestion(q);
      break;
    case "code":
      html += renderCodeQuestion(q);
      break;
  }

  // Navigation buttons
  html += `
    <div class="question-actions">
      <button class="btn btn-outline" onclick="prevQuestion()" ${session.currentIndex === 0 ? "disabled" : ""}>
        ◀ 上一题
      </button>
      <button class="btn btn-cyan" onclick="submitAnswer()">✓ 提交答案</button>
      <button class="btn btn-primary" onclick="skipQuestion()">跳过 ▶</button>
      <button class="btn btn-outline btn-sm" onclick="toggleFavorite(${q.id})" title="收藏">
        ${appState.favorites.includes(q.id) ? "⭐ 已收藏" : "☆ 收藏"}
      </button>
    </div>`;

  html += `</div>`;
  document.getElementById("main-content").innerHTML = html;

  // Start challenge timer
  if (session.type === "challenge" && session.timer > 0) {
    startChallengeTimer(session);
  }
  // Start level timer
  if (session.type === "level") {
    startLevelTimer();
  }
}

function renderChoiceQuestion(q) {
  const options = q.options;
  let html = `<div class="options-list" id="options-container">`;
  options.forEach((opt, idx) => {
    html += `
      <div class="option-item" data-opt="${idx}" onclick="selectOption(this, ${idx})">
        <span class="option-marker">${String.fromCharCode(65 + idx)}</span>
        <span>${opt}</span>
      </div>`;
  });
  html += `</div>`;
  return html;
}

function renderFillQuestion(q) {
  let html = `<div class="fill-answer" id="fill-container">`;
  q.blanks.forEach((blank, idx) => {
    html += `
      <label style="display:block;color:var(--text-secondary);margin-bottom:4px;">填空 ${idx + 1}</label>
      <input type="text" class="fill-input" data-blank="${idx}" placeholder="输入第 ${idx + 1} 个空的答案" style="margin-bottom:12px;">`;
  });
  html += `</div>`;
  return html;
}

function renderShortQuestion(q) {
  return `
    <div class="short-answer">
      <textarea placeholder="请输入你的答案……"></textarea>
    </div>
    <div class="explanation-box" style="margin-top:16px;">
      <h4>💡 评分关键词</h4>
      <p>${(q.keywords || []).join("、")}</p>
    </div>`;
}

function renderComprehensiveQuestion(q) {
  let html = `<div class="comprehensive-steps">`;
  (q.steps || []).forEach((step, idx) => {
    html += `
      <div class="step-item">
        <span class="step-num">${idx + 1}</span>
        <textarea placeholder="${step}"></textarea>
      </div>`;
  });
  html += `</div>`;
  return html;
}

function renderCodeQuestion(q) {
  return `
    <div class="code-area">
      <textarea placeholder="在此编写你的 Verilog 代码……"></textarea>
    </div>`;
}

function renderTFQuestion(q) {
  return `
    <div class="tf-options">
      <button class="tf-btn tf-true" onclick="submitTFAnswer(true)">✅ 正确</button>
      <button class="tf-btn tf-false" onclick="submitTFAnswer(false)">❌ 错误</button>
    </div>
  `;
}

function getSessionTitle(session) {
  const map = {
    quick: "快速刷题",
    levels: "闯关模式",
    challenge: "极限挑战",
    exam: "模拟考试",
    chapter: "章节练习"
  };
  if (session.type === "chapter") {
    const ch = getChapterById(session.chapterId);
    return ch ? ch.name + " 练习" : "章节练习";
  }
  if (session.type === "level") {
    return session.levelName || "关卡刷题";
  }
  return map[session.type] || "刷题中";
}

// ==================== QUESTION INTERACTION ====================
let selectedOptionIndex = null;
let answerSubmitted = false;

function selectOption(el, idx) {
  document.querySelectorAll(".option-item").forEach(item => item.classList.remove("selected"));
  el.classList.add("selected");
  selectedOptionIndex = idx;
}

function submitAnswer() {
  if (!currentSession) return;
  if (currentSession.type === "extreme") {
    submitExtremeAnswer();
    return;
  }
  if (currentSession.type === "revenge") {
    submitRevengeAnswer();
    return;
  }
  const q = currentSession.questions[currentSession.currentIndex];
  let userAnswer = null;
  let isCorrect = false;

  switch(q.type) {
    case "choice":
      if (selectedOptionIndex === null) { alert("请先选择一个选项！"); return; }
      userAnswer = selectedOptionIndex;
      isCorrect = selectedOptionIndex === q.answer;
      // Show correct/wrong highlighting
      showChoiceResult(q);
      break;
    case "fill":
      const fillInputs = document.querySelectorAll(".fill-input");
      userAnswer = Array.from(fillInputs).map(inp => inp.value.trim());
      isCorrect = checkFillAnswer(q, userAnswer);
      break;
    case "tf":
      // TF questions are submitted via submitTFAnswer button clicks
      return;
    case "short":
    case "comprehensive":
    case "code":
      // For non-auto-graded types, mark as reviewed
      userAnswer = document.querySelector("textarea")?.value || "";
      isCorrect = null; // manual review
      break;
  }

  // Save answer
  currentSession.answers[currentSession.currentIndex] = {
    questionId: q.id,
    userAnswer,
    isCorrect
  };

  // Update streak for challenge
  if (currentSession.type === "challenge") {
    if (isCorrect === true) {
      currentSession.streak = (currentSession.streak || 0) + 1;
      currentSession.maxStreak = Math.max(currentSession.maxStreak, currentSession.streak);
    } else {
      currentSession.streak = 0;
    }
  }

  // Answer effects
  if (isCorrect === true) {
    playSound('correct');
    // Flash effect on question area
    const qa = document.querySelector('.question-area');
    if (qa) { qa.classList.add('correct-flash'); setTimeout(() => qa.classList.remove('correct-flash'), 600); }
    // Streak milestone effects
    const streakVal = currentSession.type === "challenge" ? (currentSession.streak || 0) + 1 : 0;
    if (streakVal === 5 || streakVal === 10 || streakVal === 20) {
      const streakEl = document.getElementById("extreme-streak");
      if (streakEl) { streakEl.classList.add('streak-milestone'); setTimeout(() => streakEl.classList.remove('streak-milestone'), 600); }
      showCoinAnimation(streakVal * 2);
      showToast("🔥 " + streakVal + "倍金币!");
    }
  } else if (isCorrect === false) {
    playSound('wrong');
    // Shake the selected option
    if (q.type === 'choice' && selectedOptionIndex !== null) {
      const items = document.querySelectorAll('.option-item');
      items.forEach((item, idx) => {
        if (idx === selectedOptionIndex) item.classList.add('shake');
      });
    }
    const qa = document.querySelector('.question-area');
    if (qa) { qa.style.boxShadow = '0 0 20px rgba(239,71,111,0.4)'; setTimeout(() => qa.style.boxShadow = '', 500); }
  }

  // Award coins for correct answers
  if (isCorrect === true) {
    const coinsEarned = q.difficulty * 5 + (currentSession.type === "challenge" ? (currentSession.streak || 1) * 2 : 0);
    updateState({ sharedCoins: appState.sharedCoins + coinsEarned });
    showCoinAnimation(coinsEarned);
  }

  // Record answer time for speed-demon achievement
  const answerTime = currentSession.currentIndex > 0 ? Math.round((Date.now() - currentSession.lastAnswerTime) / 1000) : 999;
  if (isCorrect === true) {
    appState.lastQuestionAnswerTime = answerTime;
    saveState();
  }
  currentSession.lastAnswerTime = Date.now();

  // Update daily tasks
  updateDailyTasks(q, isCorrect);

  // Auto-advance after short delay
  if (isCorrect !== null) {
    showExplanation(q);
    setTimeout(() => {
      advanceQuestion();
    }, q.type === "choice" ? 1500 : 2500);
  } else {
    advanceQuestion();
  }
}

function submitTFAnswer(userAnswer) {
  if (answerSubmitted) return;
  answerSubmitted = true;
  const q = currentSession.questions[currentSession.currentIndex];
  const isCorrect = (userAnswer === q.answer);

  // Save answer
  currentSession.answers[currentSession.currentIndex] = {
    questionId: q.id,
    userAnswer,
    isCorrect
  };

  if (isCorrect) {
    const coinsEarned = q.difficulty * 5;
    updateState({ sharedCoins: appState.sharedCoins + coinsEarned });
    showCoinAnimation(coinsEarned);
    currentSession.correct = (currentSession.correct || 0) + 1;
  } else {
    addToWrongBook(q.id);
  }

  // Highlight buttons
  const btns = document.querySelectorAll('.tf-btn');
  btns.forEach(b => {
    b.disabled = true;
    const val = b.classList.contains('tf-true') ? true : false;
    if (val === q.answer) b.classList.add('correct');
    if (val === userAnswer && !isCorrect) b.classList.add('wrong');
  });

  showExplanation(q);
  currentSession.totalAnswered = (currentSession.totalAnswered || 0) + 1;
  updateDailyTasks(q, isCorrect);

  setTimeout(() => advanceQuestion(), 1500);
}

function showChoiceResult(q) {
  const items = document.querySelectorAll(".option-item");
  items.forEach((item, idx) => {
    if (idx === q.answer) item.classList.add("correct");
    if (idx === selectedOptionIndex && selectedOptionIndex !== q.answer) item.classList.add("wrong");
  });
}

function checkFillAnswer(q, userAnswers) {
  let allCorrect = true;
  const fillInputs = document.querySelectorAll(".fill-input");
  fillInputs.forEach((inp, idx) => {
    const correct = q.blanks[idx];
    const user = userAnswers[idx];
    const isMatch = user.toLowerCase().replace(/\s+/g, "") === correct.toLowerCase().replace(/\s+/g, "");
    if (!isMatch) {
      allCorrect = false;
      inp.style.borderColor = "var(--color-wrong)";
    } else {
      inp.style.borderColor = "var(--color-correct)";
    }
  });
  if (!allCorrect) {
    // Show correct answers
    q.blanks.forEach((blank, idx) => {
      fillInputs[idx].placeholder = "正确答案: " + blank;
    });
  }
  return allCorrect;
}

function showExplanation(q) {
  if (!q.explanation) return;
  const explanationBox = document.createElement("div");
  explanationBox.className = "explanation-box";
  explanationBox.innerHTML = `<h4>💡 解析</h4><p>${q.explanation}</p>`;

  // Add wrong book button
  if (currentSession.answers[currentSession.currentIndex]?.isCorrect === false) {
    explanationBox.innerHTML += `
      <button class="btn btn-pink btn-sm" style="margin-top:8px;" onclick="addToWrongBook(${q.id})">
        📝 加入错题本
      </button>`;
  }

  const questionArea = document.querySelector(".question-area");
  questionArea.appendChild(explanationBox);
}

function skipQuestion() {
  if (!currentSession) return;
  currentSession.answers[currentSession.currentIndex] = { questionId: currentSession.questions[currentSession.currentIndex].id, userAnswer: null, isCorrect: false };
  advanceQuestion();
}

function prevQuestion() {
  if (!currentSession || currentSession.currentIndex <= 0) return;
  currentSession.currentIndex--;
  selectedOptionIndex = null;
  renderQuestion(currentSession);
}

function advanceQuestion() {
  if (!currentSession) return;
  if (currentSession.type === "extreme") return;
  selectedOptionIndex = null;
  clearInterval(levelTimerInterval);

  // Add wrong/ungraded answer to wrong book with rich tracking
  const ans = currentSession.answers[currentSession.currentIndex];
  if (ans && ans.isCorrect === false) {
    addToWrongBook(ans.questionId);
  }

  // Save pending session
  appState.pendingSession = currentSession;

  currentSession.currentIndex++;
  if (currentSession.currentIndex >= currentSession.questions.length) {
    appState.pendingSession = null;
    showResults(currentSession);
  } else {
    renderQuestion(currentSession);
  }
  saveState();
}

// ==================== CHALLENGE TIMER ====================
let challengeTimerInterval = null;
let extremeTimerInterval = null;

function startChallengeTimer(session) {
  clearInterval(challengeTimerInterval);
  let timeLeft = session.timer || 30;
  const timerEl = document.getElementById("challenge-timer");
  if (!timerEl) return;

  challengeTimerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft + "s";
    if (timeLeft <= 5) timerEl.style.color = "var(--color-wrong)";

    if (timeLeft <= 0) {
      clearInterval(challengeTimerInterval);
      // Auto-submit with wrong answer
      if (session.questions[session.currentIndex].type === "choice") {
        currentSession.answers[currentSession.currentIndex] = {
          questionId: session.questions[session.currentIndex].id,
          userAnswer: -1,
          isCorrect: false
        };
        currentSession.streak = 0;
        showExplanation(session.questions[session.currentIndex]);
        setTimeout(() => advanceQuestion(), 1500);
      }
    }
  }, 1000);
}

// ==================== RESULTS ====================
function showResults(session) {
  clearInterval(challengeTimerInterval);
  clearInterval(levelTimerInterval);
  clearInterval(extremeTimerInterval);

  if (session.type === "extreme") {
    document.getElementById("main-content").innerHTML = renderExtremeGameOver(session);
    currentSession = null;
    return;
  }

  const total = session.questions.length;
  const correct = session.answers.filter(a => a.isCorrect === true).length;
  const wrong = session.answers.filter(a => a.isCorrect === false).length;
  const ungraded = session.answers.filter(a => a.isCorrect === null).length;
  const score = total > 0 ? Math.round((correct / (total - ungraded || 1)) * 100) : 0;
  const timeSpent = Math.round((Date.now() - session.startTime) / 1000);

  // Level session: show specialized level result
  if (session.type === "level") {
    updateState({
      totalAnswered: appState.totalAnswered + total,
      totalCorrect: appState.totalCorrect + correct,
      timeSpentToday: (appState.timeSpentToday || 0) + timeSpent,
      lastActiveDate: new Date().toDateString(),
      streak: updateStreak()
    });
    appState.completedSessions.push({
      date: new Date().toISOString(),
      type: session.type,
      totalQuestions: total,
      correct,
      score,
      timeSpent
    });
    saveState();
    document.getElementById("main-content").innerHTML = renderLevelResult(session, score, correct, total, timeSpent);
    currentSession = null;
    return;
  }

  // Update global stats
  updateState({
    totalAnswered: appState.totalAnswered + total,
    totalCorrect: appState.totalCorrect + correct,
    timeSpentToday: (appState.timeSpentToday || 0) + timeSpent,
    lastActiveDate: new Date().toDateString(),
    streak: updateStreak()
  });

  // Save completed session
  appState.completedSessions.push({
    date: new Date().toISOString(),
    type: session.type,
    totalQuestions: total,
    correct,
    score,
    timeSpent
  });
  saveState();

  // Update chapter progress
  if (session.chapterId) {
    const chProgress = appState.chapterProgress[session.chapterId] || 0;
    appState.chapterProgress[session.chapterId] = chProgress + correct;
    saveState();
  }

  // Check achievements after session completes
  checkAchievements();

  const emoji = score >= 90 ? "🏆" : score >= 70 ? "🎉" : score >= 50 ? "💪" : "📚";
  const msg = score >= 90 ? "太棒了！" : score >= 70 ? "做得不错！" : score >= 50 ? "继续加油！" : "多多练习！";

  let html = `
  <div class="result-screen">
    <div class="result-icon">${emoji}</div>
    <h2 style="margin-bottom:8px;">${msg}</h2>
    <div class="result-score">${score} 分</div>
    <p style="color:var(--text-secondary);">${getSessionTitle(session)} 已完成</p>
    <div class="result-detail">
      <div class="rd-item">
        <div class="rd-val">${total}</div>
        <div class="rd-label">总题数</div>
      </div>
      <div class="rd-item">
        <div class="rd-val" style="color:var(--color-correct);">${correct}</div>
        <div class="rd-label">正确</div>
      </div>
      <div class="rd-item">
        <div class="rd-val" style="color:var(--color-wrong);">${wrong}</div>
        <div class="rd-label">错误</div>
      </div>
      <div class="rd-item">
        <div class="rd-val">${formatTime(timeSpent)}</div>
        <div class="rd-label">用时</div>
      </div>`;

  if (session.type === "challenge") {
    html += `
      <div class="rd-item">
        <div class="rd-val" style="color:var(--color-streak);">${session.maxStreak || 0}🔥</div>
        <div class="rd-label">最大连击</div>
      </div>`;
  }

  html += `
    </div>
    <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-cyan" onclick="reviewWrongAnswers()">📝 查看错题 (${wrong})</button>
      <button class="btn btn-primary" onclick="navigateTo('home')">🏠 返回首页</button>
      <button class="btn btn-outline" onclick="retrySession()">🔄 再来一次</button>
    </div>
  </div>`;

  document.getElementById("main-content").innerHTML = html;
  currentSession = null;
}

function updateStreak() {
  const today = new Date().toDateString();
  if (appState.lastActiveDate === today) return appState.streak;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  if (appState.lastActiveDate === yesterday.toDateString()) {
    appState.checkinDays = (appState.checkinDays || 0) + 1;
    saveState();
    return appState.streak + 1;
  }
  appState.checkinDays = 1;
  saveState();
  return 1;
}

function reviewWrongAnswers() {
  if (!appState.wrongBook.length) {
    alert("没有错题记录！");
    return;
  }
  const questions = appState.wrongBook.map(w => getQuestionById(w.qid)).filter(q => q);
  if (!questions.length) { alert("错题数据异常！"); return; }
  currentSession = {
    questions: shuffleArray(questions),
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "wrongbook"
  };
  renderQuestion(currentSession);
}

function retrySession() {
  navigateTo("home");
}

// ==================== FAVORITES & WRONG BOOK ====================
function toggleFavorite(qId) {
  const idx = appState.favorites.indexOf(qId);
  if (idx >= 0) {
    appState.favorites.splice(idx, 1);
  } else {
    appState.favorites.push(qId);
  }
  saveState();
  // Re-render current question to update star
  if (currentSession) renderQuestion(currentSession);
}

function addToWrongBook(qId) {
  const existing = appState.wrongBook.find(w => w.qid === qId);
  const q = getQuestionById(qId);
  if (existing) {
    existing.wrongCount++;
    existing.lastWrong = new Date().toISOString();
    existing.correctInARow = 0;
    existing.revenged = false;
  } else {
    appState.wrongBook.push({
      qid: qId,
      wrongCount: 1,
      lastWrong: new Date().toISOString(),
      revenged: false,
      chapter: q ? q.chapter : 'unknown',
      correctInARow: 0
    });
  }
  saveState();
}

function getWrongBookEntry(qId) {
  return appState.wrongBook.find(w => w.qid === qId);
}

// ==================== PAGE: WRONG BOOK ====================
let wrongBookFilter = "all"; // all, high, mid, low, revenged

function renderWrongBookPage() {
  const allWrong = appState.wrongBook;
  if (!allWrong.length) {
    return `<div class="empty-state"><div class="empty-icon">📭</div><p>错题本为空，继续加油！<br>答错的题目会自动收录到错题本</p></div>`;
  }

  const totalCount = allWrong.length;
  const revengedCount = allWrong.filter(w => w.revenged).length;
  const pendingCount = totalCount - revengedCount;

  // Apply filter and sort
  let filtered = [...allWrong];
  switch (wrongBookFilter) {
    case "high": filtered = filtered.filter(w => w.wrongCount >= 3 && !w.revenged); break;
    case "mid": filtered = filtered.filter(w => w.wrongCount === 2 && !w.revenged); break;
    case "low": filtered = filtered.filter(w => w.wrongCount === 1 && !w.revenged); break;
    case "revenged": filtered = filtered.filter(w => w.revenged); break;
    case "count": filtered.sort((a, b) => b.wrongCount - a.wrongCount); break;
    default: /* all - show all, sort by most recent */ filtered.sort((a, b) => new Date(b.lastWrong) - new Date(a.lastWrong));
  }

  // For "all" filter, also sort by recent
  if (wrongBookFilter === "all") {
    filtered.sort((a, b) => {
      if (a.revenged !== b.revenged) return a.revenged ? 1 : -1;
      return b.wrongCount - a.wrongCount;
    });
  }

  let html = `<div class="list-page" style="animation:fadeIn 0.4s ease;">`;
  html += `<h2 style="margin-bottom:16px;">❌ 错题复仇</h2>`;

  // Stats header
  html += `<div class="card" style="margin-bottom:16px;text-align:center;padding:16px 24px;">
    <div style="display:flex;justify-content:center;gap:32px;flex-wrap:wrap;font-size:0.95rem;">
      <span>共 <b style="color:var(--accent-cyan);">${totalCount}</b> 道错题</span>
      <span>已复仇 <b style="color:var(--color-correct);">${revengedCount}</b> 道</span>
      <span>待复仇 <b style="color:var(--color-wrong);">${pendingCount}</b> 道</span>
    </div>
  </div>`;

  // Batch revenge button
  if (pendingCount > 0) {
    html += `<button class="btn btn-pink" style="margin-bottom:12px;width:100%;justify-content:center;" onclick="batchRevenge()">
      ⚔️ 批量复仇 (${Math.min(pendingCount, 5)} 题)
    </button>`;
  }

  // Filter tabs
  html += `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    ${[
      {key:"all",label:"全部",icon:""},
      {key:"count",label:"按错误次数",icon:""},
      {key:"high",label:"🔴 高频≥3",icon:""},
      {key:"mid",label:"🟠 中频2",icon:""},
      {key:"low",label:"🟡 低频1",icon:""},
      {key:"revenged",label:"🟢 已复仇",icon:""}
    ].map(f => `
      <button class="btn btn-sm ${wrongBookFilter === f.key ? 'btn-cyan' : 'btn-outline'}"
        style="padding:4px 12px;font-size:0.78rem;"
        onclick="wrongBookFilter='${f.key}';renderWrongBookPage();">${f.label}</button>
    `).join("")}
  </div>`;

  // Item list
  if (!filtered.length) {
    html += `<div class="empty-state"><div class="empty-icon">🔍</div><p>当前筛选条件下没有错题</p></div>`;
  } else {
    filtered.forEach(w => {
      const q = getQuestionById(w.qid);
      if (!q) return;
      const freqColor = w.wrongCount >= 5 ? 'var(--accent-pink)' : w.wrongCount >= 3 ? 'var(--accent-orange)' : w.wrongCount >= 2 ? 'var(--accent-gold)' : 'var(--text-muted)';
      const freqLabel = w.wrongCount >= 5 ? '🔴' : w.wrongCount >= 3 ? '🔴' : w.wrongCount >= 2 ? '🟠' : '🟡';
      const preview = q.question.replace(/<[^>]*>/g, '').substring(0, 40);
      const dateStr = new Date(w.lastWrong).toLocaleDateString('zh-CN');
      html += `
      <div class="list-item" style="${w.revenged ? 'border-left:3px solid var(--color-correct);' : 'border-left:3px solid ' + freqColor + ';'}">
        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;">
          <span style="font-size:1.2rem;flex-shrink:0;">${w.revenged ? '✅' : freqLabel}</span>
          <div class="item-info" style="min-width:0;">
            <div class="item-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              <span style="color:var(--text-muted);">#${w.qid}</span> ${preview}${q.question.length > 40 ? '...' : ''}
            </div>
            <div class="item-meta">
              ${q.chapter} · ${getTypeLabel(q.type)} · 错${w.wrongCount}次 · ${dateStr}
              ${w.revenged ? '<span style="color:var(--color-correct);"> · 已复仇 🎉</span>' : ''}
            </div>
          </div>
        </div>
        <div class="item-actions" style="flex-shrink:0;gap:4px;">
          ${!w.revenged ? `<button class="btn btn-cyan btn-sm" onclick="revengePracticeSingle(${w.qid})">⚔️ 复习</button>` : ''}
          <button class="btn btn-outline btn-sm" style="font-size:0.7rem;" onclick="removeFromWrongBook(${w.qid})">✕</button>
        </div>
      </div>`;
    });
  }

  html += `</div>`;
  return html;
}

function removeFromWrongBook(qId) {
  appState.wrongBook = appState.wrongBook.filter(w => w.qid !== qId);
  saveState();
  navigateTo("wrongbook");
}

// ==================== REVENGE PRACTICE MODE ====================
function revengePracticeSingle(qId) {
  const q = getQuestionById(qId);
  if (!q) { alert("题目不存在！"); return; }
  const entry = getWrongBookEntry(qId);
  currentSession = {
    questions: [q],
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "revenge",
    revengeEntry: entry,
    correctInARow: entry ? entry.correctInARow || 0 : 0,
    batchMode: false
  };
  renderRevengeQuestion(currentSession);
}

function batchRevenge() {
  const unrevenge = appState.wrongBook.filter(w => !w.revenged);
  if (unrevenge.length === 0) {
    alert("所有错题都已复仇，太棒了！");
    return;
  }
  const batch = shuffleArray(unrevenge).slice(0, Math.min(5, unrevenge.length));
  const questions = batch.map(w => getQuestionById(w.qid)).filter(q => q);
  if (!questions.length) { alert("无法加载错题！"); return; }
  currentSession = {
    questions,
    currentIndex: 0,
    answers: [],
    startTime: Date.now(),
    type: "revenge",
    batchMode: true,
    batchQueue: batch.map(w => w.qid),
    revengedInBatch: 0,
    batchCorrectInARow: {}
  };
  batch.forEach(w => {
    currentSession.batchCorrectInARow[w.qid] = w.correctInARow || 0;
  });
  renderRevengeQuestion(currentSession);
}

function renderRevengeQuestion(session) {
  if (session.currentIndex >= session.questions.length) {
    showRevengeResults(session);
    return;
  }
  selectedOptionIndex = null;
  const q = session.questions[session.currentIndex];
  const qId = q.id;
  const entry = getWrongBookEntry(qId) || session.revengeEntry || {};
  const currentStreak = session.batchMode
    ? (session.batchCorrectInARow[qId] || 0)
    : session.correctInARow;

  let html = `<div class="question-area">`;
  html += `<div class="session-header">
    <div class="session-title">⚔️ 错题复仇 ${session.batchMode ? `(${session.currentIndex + 1}/${session.questions.length})` : ''}</div>
    <div class="session-progress">
      连对 <span style="color:${currentStreak >= 3 ? 'var(--color-correct)' : currentStreak >= 1 ? 'var(--accent-gold)' : 'var(--text-secondary)'};font-weight:700;">${currentStreak}</span>/3 次
    </div>
  </div>`;

  // Progress indicator
  html += `<div style="display:flex;gap:8px;margin-bottom:16px;">`;
  for (let i = 0; i < 3; i++) {
    html += `<div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      background:${i < currentStreak ? 'var(--color-correct)' : 'var(--bg-primary)'};
      border:2px solid ${i < currentStreak ? 'var(--color-correct)' : 'rgba(255,255,255,0.15)'};
      color:${i < currentStreak ? '#fff' : 'var(--text-muted)'};font-weight:700;">${i < currentStreak ? '✓' : i + 1}</div>`;
  }
  html += `<span style="color:var(--text-muted);font-size:0.8rem;align-self:center;">${currentStreak >= 3 ? '🎉 复仇成功！' : '答对3次即可复仇'}</span></div>`;

  // Question header
  html += `<div class="question-header">
    <span class="chapter-badge">${q.chapter}</span>
    <span class="diff-stars">${getDifficultyStars(q.difficulty)}</span>
    <span style="color:var(--text-muted);font-size:0.8rem;margin-left:8px;">${getTypeLabel(q.type)} · 错${entry.wrongCount || 1}次</span>
    <div class="q-text">${q.id}. ${q.question}</div>
  </div>`;

  // Render based on type
  switch(q.type) {
    case "choice": html += renderChoiceQuestion(q); break;
    case "fill": html += renderFillQuestion(q); break;
    case "short": html += renderShortQuestion(q); break;
    case "comprehensive": html += renderComprehensiveQuestion(q); break;
    case "code": html += renderCodeQuestion(q); break;
  }

  html += `<div class="question-actions">
    <button class="btn btn-cyan btn-lg" style="flex:1;justify-content:center;" onclick="submitRevengeAnswer()">✓ 提交答案</button>
  </div>`;
  html += `</div>`;

  document.getElementById("main-content").innerHTML = html;
}

function submitRevengeAnswer() {
  if (!currentSession || currentSession.type !== "revenge") return;
  const q = currentSession.questions[currentSession.currentIndex];
  const qId = q.id;
  let userAnswer = null;
  let isCorrect = false;

  switch(q.type) {
    case "choice":
      if (selectedOptionIndex === null) { alert("请先选择一个选项！"); return; }
      userAnswer = selectedOptionIndex;
      isCorrect = selectedOptionIndex === q.answer;
      showChoiceResult(q);
      break;
    case "fill":
      const fillInputs = document.querySelectorAll(".fill-input");
      userAnswer = Array.from(fillInputs).map(inp => inp.value.trim());
      isCorrect = checkFillAnswer(q, userAnswer);
      break;
    default:
      userAnswer = document.querySelector("textarea")?.value || "";
      isCorrect = null;
  }

  // Get the wrongBook entry
  const entry = getWrongBookEntry(qId);
  if (!entry) return;

  if (isCorrect === true) {
    playSound('correct');
    showCoinAnimation(5);
    const qa = document.querySelector('.question-area');
    if (qa) { qa.classList.add('correct-flash'); setTimeout(() => qa.classList.remove('correct-flash'), 600); }

    if (currentSession.batchMode) {
      currentSession.batchCorrectInARow[qId] = (currentSession.batchCorrectInARow[qId] || 0) + 1;
      entry.correctInARow = currentSession.batchCorrectInARow[qId];
    } else {
      currentSession.correctInARow = (currentSession.correctInARow || 0) + 1;
      entry.correctInARow = currentSession.correctInARow;
    }

    // Check if revenged (3 consecutive correct)
    const currentStreak = currentSession.batchMode ? currentSession.batchCorrectInARow[qId] : currentSession.correctInARow;
    if (currentStreak >= 3 && !entry.revenged) {
      entry.revenged = true;
      entry.revengedAt = new Date().toISOString();
      if (currentSession.batchMode) {
        currentSession.revengedInBatch = (currentSession.revengedInBatch || 0) + 1;
      }
      updateState({ sharedCoins: appState.sharedCoins + 50 });
      showRevengeToast(qId);
      playSound('achievement');
    }

    // Award small coin reward per correct answer
    updateState({ sharedCoins: appState.sharedCoins + 5 });
  } else if (isCorrect === false) {
    playSound('wrong');
    if (q.type === 'choice' && selectedOptionIndex !== null) {
      const items = document.querySelectorAll('.option-item');
      items.forEach((item, idx) => {
        if (idx === selectedOptionIndex) item.classList.add('shake');
      });
    }
    // Reset consecutive correct count
    if (currentSession.batchMode) {
      currentSession.batchCorrectInARow[qId] = 0;
      entry.correctInARow = 0;
    } else {
      currentSession.correctInARow = 0;
      entry.correctInARow = 0;
    }
    addToWrongBook(qId); // increment wrongCount
  }

  // Update daily tasks
  updateDailyTasks(q, isCorrect);

  saveState();

  // Show explanation and auto-advance
  if (isCorrect !== null) {
    showExplanation(q);
    // Disable option interaction
    document.querySelectorAll(".option-item").forEach(el => el.style.pointerEvents = "none");
    setTimeout(() => {
      if (currentSession && currentSession.type === "revenge") {
        currentSession.currentIndex++;
        if (currentSession.currentIndex >= currentSession.questions.length) {
          showRevengeResults(currentSession);
        } else {
          renderRevengeQuestion(currentSession);
        }
      }
    }, 1500);
  }
}

function showRevengeToast(qId) {
  const toast = document.createElement("div");
  toast.style.cssText = `
    position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:300;
    background:linear-gradient(135deg,var(--color-correct),#06d6a0);
    color:#fff;padding:14px 28px;border-radius:12px;font-size:1rem;font-weight:700;
    animation:revengeToastIn 0.4s ease, revengeToastOut 0.4s ease 2s forwards;
    box-shadow:0 4px 24px rgba(6,214,160,0.4);
  `;
  toast.textContent = "⚔️ 复仇成功！+50 💰";
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2500);
}

function showRevengeResults(session) {
  let totalRevenged = 0;
  if (session.batchMode) {
    totalRevenged = session.revengedInBatch || 0;
    // Bonus for completing all
    if (totalRevenged >= session.questions.length) {
      updateState({ sharedCoins: appState.sharedCoins + 100 });
    }
  } else {
    totalRevenged = session.correctInARow >= 3 ? 1 : 0;
  }

  const bonusCoins = session.batchMode && totalRevenged >= session.questions.length ? 100 : 0;
  const msg = totalRevenged > 0
    ? `🎉 成功复仇 ${totalRevenged} 道错题！${bonusCoins > 0 ? '全勤奖励 +' + bonusCoins + ' 💰' : ''}`
    : '💪 继续努力，再复习一次吧！';

  saveState();
  // Check achievements after revenge
  checkAchievements();

  let html = `<div class="result-screen">
    <div class="result-icon">${totalRevenged > 0 ? '⚔️' : '💪'}</div>
    <h2 style="margin-bottom:8px;">错题复仇</h2>
    <p style="color:var(--accent-cyan);font-size:1.2rem;margin-bottom:20px;">${msg}</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-cyan" onclick="navigateTo('wrongbook')">📋 返回错题本</button>
      <button class="btn btn-pink" onclick="batchRevenge()">⚔️ 继续复仇</button>
      <button class="btn btn-outline" onclick="navigateTo('home')">🏠 返回首页</button>
    </div>
  </div>`;

  document.getElementById("main-content").innerHTML = html;
  currentSession = null;
}

// ==================== PAGE: FAVORITES ====================

  };

function startSingleQuestion(qId) {

    startTime: Date.now(),

// ==================== PAGE: LEVELS (LEVEL MAP) ====================
function renderLevelMap() {
  const chapterKeys = ["ch1","ch2","ch3","ch4","ch5","ch6"];
  let html = `<div class="level-map"><h2 style="margin-bottom:24px;">🗺️ 闯关地图</h2>
    <p style="color:var(--text-secondary);margin-bottom:24px;">逐关突破，从基础到进阶，系统掌握数字逻辑</p>`;

  getCurrentChapters().forEach((ch, chIdx) => {
    const chId = ch.id;
    const chapterUnlocked = isChapterFullyUnlocked(chId);
    const levels = getCurrentLevels()[chId] || [];
    const totalLevels = levels.length;

    // Count completed levels and total stars
    let completedCount = 0;
    let totalStars = 0;
    const chState = appState.chapters[chId];
    levels.forEach(lv => {
      const ls = chState && chState.levels && chState.levels[lv.id];
      if (ls && ls.completed) {
        completedCount++;
        totalStars += (ls.stars || 0);
      }
    });

    html += `<div class="chapter-section${chapterUnlocked ? '' : ' locked'}">`;

    // Chapter header
    html += `<div class="chapter-header">
      <span class="ch-icon">${ch.icon}</span>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-progress-text">${completedCount}/${totalLevels} 关已通 · ${totalStars}⭐</div>
        <div class="progress-bar" style="margin-top:6px;max-width:250px;">
          <div class="fill" style="width:${totalLevels > 0 ? Math.round((completedCount/totalLevels)*100) : 0}%;"></div>
        </div>
      </div>
      ${chapterUnlocked ? '' : `<span class="ch-lock-text">🔒 需通关 Ch${chIdx}</span>`}
    </div>`;

    // Level cards row
    html += `<div class="level-cards">`;
    levels.forEach((lv, lvIdx) => {
      const ls = chState && chState.levels && chState.levels[lv.id];
      const levelCompleted = ls && ls.completed;
      const levelStars = ls ? (ls.stars || 0) : 0;
      // Level is unlocked if chapter is unlocked AND previous level is completed (or it's the first level)
      const prevCompleted = lvIdx === 0 || (() => {
        const prevLs = chState && chState.levels && chState.levels[levels[lvIdx - 1].id];
        return prevLs && prevLs.completed;
      })();
      const levelUnlocked = chapterUnlocked && prevCompleted;
      const inProgress = levelUnlocked && !levelCompleted;

      let cardClass = 'level-card';
      let cardInner = '';

      if (!levelUnlocked) {
        cardClass += ' locked';
        cardInner = `<div class="lc-lock">🔒</div><div class="lc-name">${lv.name}</div>`;
      } else if (levelCompleted) {
        cardClass += ' completed';
        if (levelStars >= 3) cardClass += ' three-star';
        const starsStr = '⭐'.repeat(Math.min(levelStars, 3)) + '☆'.repeat(Math.max(0, 3 - levelStars));
        cardInner = `<div class="lc-stars">${starsStr}</div><div class="lc-name">${lv.name}</div><div class="lc-btn" style="color:var(--color-correct);font-size:0.75rem;">✓ 已通关</div>`;
      } else if (inProgress) {
        cardClass += ' pulse';
        cardInner = `<div class="lc-name">${lv.name}</div><div class="lc-btn"><span class="btn btn-cyan btn-sm">▶ 开始</span></div>`;
      } else {
        cardInner = `<div class="lc-name">${lv.name}</div><div class="lc-btn"><span class="btn btn-primary btn-sm">开始</span></div>`;
      }

      html += `<div class="${cardClass}" ${levelUnlocked ? `onclick="startLevelSession('${lv.id}')"` : ''}>
        ${cardInner}
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;
  return html;
}

// ==================== EXAM SESSION ====================
let examTimerInterval = null;

function startExamSessionCustom() {
  const selectedTypes = Object.entries(examConfig.types)
    .filter(([_, v]) => v)
    .map(([k]) => k);

  if (selectedTypes.length === 0) { alert("请至少选择一种题型！"); return; }

  let pool = getCurrentBank().filter(q => selectedTypes.includes(q.type));
  if (pool.length === 0) { alert("没有符合条件的题目！"); return; }

  const count = Math.min(examConfig.questionCount, pool.length);
  if (examConfig.mode === "random") {
    pool = shuffleArray(pool);
  }
  const questions = pool.slice(0, count);

  currentSession = {
    questions,
    currentIndex: 0,
    answers: new Array(questions.length).fill(null),
    startTime: Date.now(),
    type: "exam-custom",
    timeLimit: examConfig.timeLimit * 60,
    timeRemaining: examConfig.timeLimit * 60,
    markedQuestions: new Set(),
    longestStreak: 0,
    currentStreak: 0
  };

  appState.pendingSession = null;
  saveState();
  renderExamQuestion(currentSession);
}

function renderExamQuestion(session) {
  if (!session || session.type !== "exam-custom") return;
  if (session.currentIndex >= session.questions.length) {
    showExamResults(session);
    return;
  }

  clearInterval(examTimerInterval);
  selectedOptionIndex = null;

  const q = session.questions[session.currentIndex];
  const total = session.questions.length;

  // Build nav dots
  let navHTML = '<div class="exam-nav-bar">';
  for (let i = 0; i < total; i++) {
    let dotClass = 'exam-nav-dot';
    const ans = session.answers[i];
    if (ans && ans.isCorrect === true) dotClass += ' correct';
    else if (ans && ans.isCorrect === false) dotClass += ' wrong';
    if (i === session.currentIndex) dotClass += ' current';
    if (session.markedQuestions && session.markedQuestions.has(i)) dotClass += ' marked';

    const icon = ans && ans.isCorrect === true ? '✓' : (ans && ans.isCorrect === false ? '✗' : (i + 1));
    navHTML += `<span class="${dotClass}" onclick="jumpToExamQuestion(${i})">${icon}</span>`;
  }
  navHTML += '</div>';

  // Timer
  const remaining = session.timeRemaining || 0;
  const rm = Math.floor(remaining / 60);
  const rs = remaining % 60;
  const timerDisplay = `${rm}:${String(rs).padStart(2, '0')}`;

  let html = `<div class="question-area">`;

  // Exam HUD
  html += `
    <div class="challenge-hud" style="border-color:rgba(0,245,212,0.2);">
      <div class="hud-stat">🏁 <span style="color:var(--accent-cyan);font-weight:600;">模拟考试</span></div>
      <div class="hud-divider"></div>
      <div class="hud-stat">⏱ <span class="hud-val" id="exam-timer" ${remaining <= 300 ? 'style="color:var(--color-wrong);animation:pulse 1s infinite;"' : ''}>${timerDisplay}</span></div>
      <div class="hud-divider"></div>
      <div class="hud-stat">📊 <span class="hud-val">${session.currentIndex + 1}/${total}</span></div>
      <div class="hud-divider"></div>
      <div class="hud-stat">🔥 <span class="hud-val">${session.currentStreak || 0}</span></div>
    </div>`;

  // Warning banner for 5 min remaining
  if (remaining <= 300 && remaining > 0) {
    html += `<div class="exam-warning-banner">⚠️ 考试还剩 ${rm} 分钟，请注意时间！</div>`;
  }

  // Nav dots
  html += navHTML;

  // Question header
  html += `
    <div class="question-header">
      <span class="chapter-badge">${q.chapter}</span>
      <span class="diff-stars">${getDifficultyStars(q.difficulty)}</span>
      <span style="color:var(--text-muted);font-size:0.8rem;margin-left:8px;">${getTypeLabel(q.type)}</span>
      <div class="q-text">${q.id}. ${q.question}</div>
    </div>`;

  // Render based on type
  switch(q.type) {
    case "choice": html += renderChoiceQuestion(q); break;
    case "fill": html += renderFillQuestion(q); break;
    case "short": html += renderShortQuestion(q); break;
    case "comprehensive": html += renderComprehensiveQuestion(q); break;
    case "code": html += renderCodeQuestion(q); break;
  }

  // Action buttons
  const isMarked = session.markedQuestions && session.markedQuestions.has(session.currentIndex);
  html += `
    <div class="question-actions">
      <button class="btn btn-outline" onclick="prevExamQuestion()" ${session.currentIndex === 0 ? "disabled" : ""}>◀ 上一题</button>
      <button class="btn ${isMarked ? 'btn-pink' : 'btn-outline'}" onclick="toggleMarkExamQuestion()">${isMarked ? '🔖 已标记' : '🔖 标记'}</button>
      <button class="btn btn-cyan" onclick="submitExamAnswer()">✓ 提交答案</button>
      <button class="btn btn-outline" onclick="nextExamQuestion()">下一题 ▶</button>
    </div>
    <div style="text-align:right;margin-top:12px;">
      <button class="btn btn-pink btn-sm" onclick="submitExamEarly()">📝 交卷</button>
    </div>`;

  html += `</div>`;
  document.getElementById("main-content").innerHTML = html;

  // Start exam timer
  startExamTimer(session);
}

function startExamTimer(session) {
  clearInterval(examTimerInterval);
  examTimerInterval = setInterval(() => {
    if (!currentSession || currentSession.type !== "exam-custom") {
      clearInterval(examTimerInterval);
      return;
    }
    const elapsed = Math.floor((Date.now() - session.startTime) / 1000);
    session.timeRemaining = Math.max(0, session.timeLimit - elapsed);

    const timerEl = document.getElementById("exam-timer");
    if (timerEl) {
      const rm = Math.floor(session.timeRemaining / 60);
      const rs = session.timeRemaining % 60;
      timerEl.textContent = `${rm}:${String(rs).padStart(2, '0')}`;
      if (session.timeRemaining <= 300) {
        timerEl.style.color = "var(--color-wrong)";
        timerEl.style.animation = "pulse 1s infinite";
      }
    }

    if (session.timeRemaining <= 0) {
      clearInterval(examTimerInterval);
      autoSubmitExam();
    }
  }, 1000);
}

function jumpToExamQuestion(idx) {
  if (!currentSession || currentSession.type !== "exam-custom") return;
  if (idx < 0 || idx >= currentSession.questions.length) return;
  currentSession.currentIndex = idx;
  selectedOptionIndex = null;
  renderExamQuestion(currentSession);
}

function prevExamQuestion() {
  if (!currentSession || currentSession.type !== "exam-custom") return;
  if (currentSession.currentIndex <= 0) return;
  currentSession.currentIndex--;
  selectedOptionIndex = null;
  renderExamQuestion(currentSession);
}

function nextExamQuestion() {
  if (!currentSession || currentSession.type !== "exam-custom") return;
  if (currentSession.currentIndex >= currentSession.questions.length - 1) return;
  currentSession.currentIndex++;
  selectedOptionIndex = null;
  renderExamQuestion(currentSession);
}

function toggleMarkExamQuestion() {
  if (!currentSession || currentSession.type !== "exam-custom") return;
  if (!currentSession.markedQuestions) currentSession.markedQuestions = new Set();
  const idx = currentSession.currentIndex;
  if (currentSession.markedQuestions.has(idx)) {
    currentSession.markedQuestions.delete(idx);
  } else {
    currentSession.markedQuestions.add(idx);
  }
  renderExamQuestion(currentSession);
}

function submitExamAnswer() {
  if (!currentSession || currentSession.type !== "exam-custom") return;
  const q = currentSession.questions[currentSession.currentIndex];
  let userAnswer = null;
  let isCorrect = false;

  switch(q.type) {
    case "choice":
      if (selectedOptionIndex === null) { alert("请先选择一个选项！"); return; }
      userAnswer = selectedOptionIndex;
      isCorrect = selectedOptionIndex === q.answer;
      showChoiceResult(q);
      // Disable further clicks on options
      document.querySelectorAll(".option-item").forEach(el => el.style.pointerEvents = "none");
      break;
    case "fill":
      const fillInputs = document.querySelectorAll(".fill-input");
      userAnswer = Array.from(fillInputs).map(inp => inp.value.trim());
      isCorrect = checkFillAnswer(q, userAnswer);
      break;
    case "short":
    case "comprehensive":
    case "code":
      userAnswer = document.querySelector("textarea")?.value || "";
      isCorrect = null;
      break;
  }

  // Save answer
  currentSession.answers[currentSession.currentIndex] = {
    questionId: q.id,
    userAnswer,
    isCorrect
  };

  // Update streak
  if (isCorrect === true) {
    playSound('correct');
    showCoinAnimation(q.difficulty * 2);
    const qa = document.querySelector('.question-area');
    if (qa) { qa.classList.add('correct-flash'); setTimeout(() => qa.classList.remove('correct-flash'), 600); }
    currentSession.currentStreak = (currentSession.currentStreak || 0) + 1;
    currentSession.longestStreak = Math.max(currentSession.longestStreak || 0, currentSession.currentStreak);
  } else if (isCorrect === false) {
    playSound('wrong');
    if (q.type === 'choice' && selectedOptionIndex !== null) {
      const items = document.querySelectorAll('.option-item');
      items.forEach((item, idx) => {
        if (idx === selectedOptionIndex) item.classList.add('shake');
      });
    }
    currentSession.currentStreak = 0;
    addToWrongBook(q.id);
  }

  // Update daily tasks
  if (isCorrect !== null) {
    updateDailyTasks(q, isCorrect);
  }

  saveState();

  // Show explanation and auto-advance
  if (isCorrect !== null) {
    showExplanation(q);
    setTimeout(() => {
      if (currentSession && currentSession.type === "exam-custom") {
        currentSession.currentIndex++;
        if (currentSession.currentIndex >= currentSession.questions.length) {
          showExamResults(currentSession);
        } else {
          renderExamQuestion(currentSession);
        }
      }
    }, 1500);
  }
}

function submitExamEarly() {
  if (!currentSession || currentSession.type !== "exam-custom") return;
  const unanswered = currentSession.answers.filter(a => !a).length;
  if (!confirm(`确定要交卷吗？\n还有 ${unanswered} 题未作答。\n\n未答题目将记为错误。`)) return;
  showExamResults(currentSession);
}

function autoSubmitExam() {
  if (!currentSession || currentSession.type !== "exam-custom") return;
  showToast("⏰ 考试时间到，自动交卷！");
  showExamResults(currentSession);
}

function showExamResults(session) {
  clearInterval(examTimerInterval);
  const total = session.questions.length;
  const correct = session.answers.filter(a => a && a.isCorrect === true).length;
  const wrong = session.answers.filter(a => a && a.isCorrect === false).length;
  const nullAnswers = session.answers.filter(a => a && a.isCorrect === null).length;
  const unanswered = session.answers.filter(a => !a).length;

  // Fill in unanswered/null-graded as wrong
  for (let i = 0; i < session.answers.length; i++) {
    const ans = session.answers[i];
    if (!ans || ans.isCorrect === null) {
      const q = session.questions[i];
      session.answers[i] = { questionId: q.id, userAnswer: ans ? ans.userAnswer : null, isCorrect: false };
      addToWrongBook(q.id);
    }
  }

  const totalWrong = wrong + unanswered + nullAnswers;
  const scorable = total; // all questions now scored
  const score = scorable > 0 ? Math.round((correct / scorable) * 100) : 0;
  const timeSpent = Math.round((Date.now() - session.startTime) / 1000);
  const longestStreak = session.longestStreak || 0;

  // Grading
  let gradeText = '', gradeEmoji = '', gradeColor = '';
  if (score >= 90) { gradeText = '优秀'; gradeEmoji = '🥇'; gradeColor = 'var(--accent-gold)'; }
  else if (score >= 80) { gradeText = '良好'; gradeEmoji = '🥈'; gradeColor = 'var(--text-secondary)'; }
  else if (score >= 70) { gradeText = '及格'; gradeEmoji = '🥉'; gradeColor = 'var(--accent-orange)'; }
  else { gradeText = '不及格'; gradeEmoji = '📚'; gradeColor = 'var(--color-wrong)'; }

  // Type breakdown
  const typeStats = {};
  session.questions.forEach((q, i) => {
    const ans = session.answers[i];
    if (!typeStats[q.type]) typeStats[q.type] = { total: 0, correct: 0 };
    typeStats[q.type].total++;
    if (ans && ans.isCorrect === true) typeStats[q.type].correct++;
  });

  // Update global stats
  updateState({
    totalAnswered: appState.totalAnswered + total,
    totalCorrect: appState.totalCorrect + correct,
    timeSpentToday: (appState.timeSpentToday || 0) + timeSpent,
    lastActiveDate: new Date().toDateString(),
    streak: updateStreak()
  });

  // Save exam history
  if (!appState.examHistory) appState.examHistory = [];
  appState.examHistory.push({
    date: new Date().toISOString(),
    score,
    correct,
    total,
    wrong: totalWrong,
    timeSpent,
    longestStreak,
    typeStats
  });

  appState.completedSessions.push({
    date: new Date().toISOString(),
    type: "exam",
    totalQuestions: total,
    correct,
    score,
    timeSpent
  });

  saveState();

  // Award coins
  const coinsEarned = Math.round(score * 0.5) + correct * 2;
  updateState({ sharedCoins: appState.sharedCoins + coinsEarned });

  // Check achievements
  checkAchievements();

  // Build type bars
  const typeNames = { choice: "选择", fill: "填空", short: "简答", comprehensive: "综合", code: "编程" };
  const typeColors = ["var(--accent-cyan)", "var(--accent-purple)", "var(--accent-gold)", "var(--accent-pink)", "var(--accent-orange)"];
  let typeBarsHTML = Object.entries(typeStats).map(([type, ts], idx) => {
    const pct = ts.total > 0 ? Math.round((ts.correct / ts.total) * 100) : 0;
    return `
      <div class="etb-row">
        <span class="etb-label">${typeNames[type] || type}</span>
        <div class="etb-bar-wrap">
          <div class="etb-bar-fill" style="width:${pct}%;background:${typeColors[idx % typeColors.length]};"></div>
        </div>
        <span class="etb-pct">${pct}%</span>
      </div>`;
  }).join("");

  currentSession = null;

  document.getElementById("main-content").innerHTML = `
  <div class="exam-result">
    <h2 style="margin-bottom:16px;">🏁 考试成绩单</h2>

    <div class="exam-score-circle">
      <div class="esc-score">${score} 分</div>
      <div class="esc-grade" style="color:${gradeColor};">${gradeText}</div>
      <div class="esc-medal">${gradeEmoji}</div>
    </div>

    <div class="stats-row" style="margin-bottom:20px;">
      <div class="stat-card">
        <div class="stat-val" style="color:var(--color-correct);">${correct}/${total}</div>
        <div class="stat-label">📊 正确</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--color-wrong);">${totalWrong}</div>
        <div class="stat-label">❌ 错误/未答</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${formatTime(timeSpent)}</div>
        <div class="stat-label">⏱ 用时</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--accent-gold);">${longestStreak}🔥</div>
        <div class="stat-label">🔥 最长连击</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px;text-align:left;">
      <h4 style="margin-bottom:12px;color:var(--accent-cyan);">📈 各题型正确率</h4>

// ==================== ACHIEVEMENTS SYSTEM ====================
function checkAchievements() {
  if (!appState.unlockedAchievements) appState.unlockedAchievements = [];
  const unlockedIds = appState.unlockedAchievements.map(u => u.id);
  let newUnlocks = [];

  // Count revenged items
  const revengedCount = appState.wrongBook.filter(w => w.revenged).length;

  // Count levels with 3 stars
  let threeStarLevels = 0;
  let anyLevelCompleted = false;
  let allLevelsThreeStar = true;
  for (const chId in getCurrentLevels()) {
    const levels = getCurrentLevels()[chId];
    const chState = appState.chapters[chId];
    levels.forEach(lv => {
      const ls = chState && chState.levels && chState.levels[lv.id];
      if (ls && ls.completed) {
        anyLevelCompleted = true;
        if ((ls.stars || 0) >= 3) threeStarLevels++;
        else allLevelsThreeStar = false;
      } else {
        allLevelsThreeStar = false;
      }
    });
  }
  appState.levelThreeStarCount = threeStarLevels;

  // Check perfect types (100% on all questions of a type in any session)
  if (!appState.perfectTypeSet) appState.perfectTypeSet = [];
  appState.completedSessions.forEach(s => {
    if (s.score >= 100 && s.totalQuestions >= 3) {
      // Try to detect which type was perfect - check if all questions were same type
      // For simplicity, track type-based perfect sessions
    }
  });

  // Check comprehensive perfect (exam type with comprehensive questions)
  const lastExtreme = appState.extremeRecords && appState.extremeRecords.length > 0
    ? appState.extremeRecords[appState.extremeRecords.length - 1] : null;

  // Current hour for night-owl
  const currentHour = new Date().getHours();

  // Persistent: check if any wrongBook entry went from wrongCount>=3 to revenged
  // This is checked when a question gets revenged
  const hasPersistent = appState.wrongBook.some(w => w.revenged && w.wrongCount >= 3);

  ACHIEVEMENTS.forEach(a => {
    if (unlockedIds.includes(a.id)) return; // already unlocked

    let met = false;
    switch (a.id) {
      case "first-question": met = appState.totalAnswered >= 1; break;
      case "streak-5": met = (appState.streak >= 5); break;
      case "first-level": met = anyLevelCompleted; break;
      case "three-star": met = threeStarLevels >= 1; break;
      case "total-100": met = appState.totalAnswered >= 100; break;
      case "revenge-5": met = revengedCount >= 5; break;
      case "checkin-3": met = (appState.checkinDays || 0) >= 3; break;
      case "checkin-7": met = (appState.checkinDays || 0) >= 7; break;
      case "all-types": met = (appState.perfectTypeSet || []).length >= 5; break;
      case "total-500": met = appState.totalAnswered >= 500; break;
      case "streak-50": met = appState.completedSessions.some(s => s.type === "extreme" && s.maxStreak >= 50); break;
      case "all-chapters": met = allLevelsThreeStar; break;
      case "exam-95": met = appState.completedSessions.some(s => s.type === "exam" && s.score >= 95 && s.totalQuestions >= 5); break;
      case "master":
        const allOtherIds = ACHIEVEMENTS.filter(x => x.id !== "master").map(x => x.id);
        met = allOtherIds.every(id => unlockedIds.includes(id) || newUnlocks.some(n => n.id === id));
        break;
      case "speed-demon": met = (appState.lastQuestionAnswerTime || 999) < 30 && (appState.lastQuestionAnswerTime || 999) > 0; break;
      case "streak-10": met = appState.completedSessions.some(s => s.type === "extreme" && s.maxStreak >= 10); break;
      case "rich": met = appState.sharedCoins >= 5000; break;
      case "night-owl": met = (currentHour >= 0 && currentHour < 5); break;
      case "persistent": met = hasPersistent; break;
      case "unlucky": met = lastExtreme && lastExtreme.score === 13; break;
    }

    if (met) {
      newUnlocks.push({ id: a.id, unlockedAt: new Date().toISOString() });
    }
  });

  // Apply new unlocks
  if (newUnlocks.length > 0) {
    let totalPoints = 0;
    newUnlocks.forEach(n => {
      appState.unlockedAchievements.push(n);
      const ach = ACHIEVEMENTS.find(a => a.id === n.id);
      if (ach) totalPoints += ach.points;
    });
    updateState({ sharedCoins: appState.sharedCoins + totalPoints });
    showAchievementToast(newUnlocks);
    saveState();
  }
}

// ==================== DAILY TASKS ====================
function updateDailyTasks(question, isCorrect) {
  resetDailyTasksIfNewDay();
  if (!appState.dailyTaskProgress) appState.dailyTaskProgress = {};

  DAILY_TASKS.forEach(task => {
    let progress = appState.dailyTaskProgress[task.id] || { progress: 0, completed: false, claimed: false };

    switch (task.type) {
      case "choice":
        if (question && question.type === "choice") progress.progress++;
        break;
      case "streak":
        if (isCorrect === true) progress.progress++;
        else progress.progress = 0; // reset streak on wrong answer
        break;
      case "comprehensive":
        if (question && question.type === "comprehensive") progress.progress++;
        break;
      case "time":
        // Track via timeSpentToday - handled when task card renders
        progress.progress = appState.timeSpentToday || 0;
        break;
    }

    if (progress.progress >= task.target && !progress.completed) {
      progress.completed = true;
    }
    appState.dailyTaskProgress[task.id] = progress;
  });
  saveState();
}

function claimDailyTaskReward(taskId) {
  resetDailyTasksIfNewDay();
  const task = DAILY_TASKS.find(t => t.id === taskId);
  if (!task) return;
  const progress = appState.dailyTaskProgress[taskId];
  if (!progress || !progress.completed || progress.claimed) return;
  progress.claimed = true;
  appState.dailyTaskProgress[taskId] = progress;
  updateState({ sharedCoins: appState.sharedCoins + task.reward });
  saveState();
  // Check if all 4 claimed for bonus
  const allClaimed = DAILY_TASKS.every(t => {
    const p = appState.dailyTaskProgress[t.id];
    return p && p.claimed;
  });
  if (allClaimed && !appState.dailyTaskProgress._allBonusClaimed) {
    appState.dailyTaskProgress._allBonusClaimed = true;
    updateState({ sharedCoins: appState.sharedCoins + 100 });
    alert("🎉 全勤奖励！+100 💰");
  }
  navigateTo("home");
}

// ==================== CHART DRAWING FUNCTIONS ====================
function drawBarChart(labels, values) {
  const canvas = document.getElementById('barChartCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { top: 20, right: 20, bottom: 30, left: 35 };

  // Background
  ctx.fillStyle = '#0f0e17';
  ctx.fillRect(0, 0, w, h);

  // Grid lines
  const maxVal = Math.max(...values, 1);
  ctx.strokeStyle = 'rgba(108,108,128,0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ((h - pad.top - pad.bottom) / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
    // Value label
    ctx.fillStyle = '#6c6c80';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * (1 - i / 4)), pad.left - 5, y + 4);
  }

  // Bars
  const barW = ((w - pad.left - pad.right) / labels.length) * 0.6;
  const gap = ((w - pad.left - pad.right) / labels.length) * 0.4;
  values.forEach((v, i) => {
    const barH = maxVal > 0 ? ((v / maxVal) * (h - pad.top - pad.bottom)) : 0;
    const x = pad.left + i * (barW + gap) + gap / 2;
    const y = h - pad.bottom - barH;

    // Gradient bar
    const gradient = ctx.createLinearGradient(x, y, x, h - pad.bottom);
    gradient.addColorStop(0, '#00f5d4');
    gradient.addColorStop(1, 'rgba(0,245,212,0.1)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.moveTo(x, y + 4);
    ctx.lineTo(x, h - pad.bottom);
    ctx.lineTo(x + barW, h - pad.bottom);
    ctx.lineTo(x + barW, y + 4);
    ctx.quadraticCurveTo(x + barW, y, x + barW - 4, y);
    ctx.lineTo(x + 4, y);
    ctx.quadraticCurveTo(x, y, x, y + 4);
    ctx.fill();

    // Label
    ctx.fillStyle = '#6c6c80';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(labelDayMap[labels[i]] || labels[i], x + barW / 2, h - 8);
  });
}

function drawLineChart(labels, values) {
  const canvas = document.getElementById('lineChartCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { top: 20, right: 20, bottom: 30, left: 35 };

  // Background
  ctx.fillStyle = '#0f0e17';
  ctx.fillRect(0, 0, w, h);

  // Grid lines
  const maxVal = Math.max(...values, 10);
  ctx.strokeStyle = 'rgba(108,108,128,0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ((h - pad.top - pad.bottom) / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
    ctx.fillStyle = '#6c6c80';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * (1 - i / 4)) + '%', pad.left - 5, y + 4);
  }

  // Line
  if (values.length < 2) {
    // Draw single dot
    if (values.length === 1) {
      const x = pad.left + (w - pad.left - pad.right) / 2;
      const y = pad.top + (h - pad.top - pad.bottom) * (1 - values[0] / maxVal);
      ctx.fillStyle = '#7b2ff7';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    ctx.strokeStyle = '#7b2ff7';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    const stepX = (w - pad.left - pad.right) / (values.length - 1 || 1);
    values.forEach((v, i) => {
      const x = pad.left + stepX * i;
      const y = pad.top + (h - pad.top - pad.bottom) * (1 - v / maxVal);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Points
    ctx.fillStyle = '#7b2ff7';
    values.forEach((v, i) => {
      const x = pad.left + stepX * i;
      const y = pad.top + (h - pad.top - pad.bottom) * (1 - v / maxVal);
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0f0e17';
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#7b2ff7';
    });
  }

  // Labels
  const stepX = (w - pad.left - pad.right) / (labels.length - 1 || 1);
  labels.forEach((l, i) => {
    ctx.fillStyle = '#6c6c80';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(labelDayMap[l] || l, pad.left + stepX * i, h - 8);
  });
}

const labelDayMap = { '日':'日', '一':'一', '二':'二', '三':'三', '四':'四', '五':'五', '六':'六', '7':'日', '1':'一', '2':'二', '3':'三', '4':'四', '5':'五', '6':'六' };

function applySkin(skinId) {
  const skin = SKINS[skinId];
  if (!skin) return;
  const root = document.documentElement;
  Object.entries(skin).forEach(([key, value]) => {
    root.style.setProperty(key, value);
  });
  appState.equippedSkin = skinId;
  saveState();
}

  const skinId = appState.equippedSkin || "cyber-academic";
  applySkin(skinId);
}

// ==================== COIN/SHOP HELPERS ====================
function playSound(type) {
  if (!appState.settings.soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.value = 0.1;
    if (type === 'correct') { osc.frequency.value = 880; osc.type = 'sine'; }
    else if (type === 'wrong') { osc.frequency.value = 200; osc.type = 'square'; }
    else if (type === 'click') { osc.frequency.value = 600; osc.type = 'sine'; }
    else if (type === 'achievement') { osc.frequency.value = 660; osc.type = 'triangle'; }
    osc.start(); osc.stop(ctx.currentTime + 0.15);
  } catch(e) { /* Audio not supported */ }
}

function showToast(msg) {
  const existing = document.querySelector(".toast-notify");
  if (existing) existing.remove();
  const toast = document.createElement("div");
  toast.className = "toast-notify";
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2200);
}

function showCoinAnimation(amount) {
  const coin = document.createElement("div");
  coin.className = "coin-float";
  coin.textContent = "+" + (amount || 10) + " 💰";
  coin.style.left = (40 + Math.random() * 20) + "%";
  coin.style.top = (40 + Math.random() * 10) + "%";
  document.body.appendChild(coin);
  setTimeout(() => { if (coin.parentNode) coin.remove(); }, 1600);
}

function buyShopItem(itemId) {
  const item = SHOP_ITEMS.find(i => i.id === itemId);
  if (!item) return;
  if (appState.sharedCoins < item.price) { showToast("余额不足！"); return; }
  if (!confirm(`确认购买 ${item.name}？\n价格: ${item.price} 💰`)) return;

  appState.sharedCoins -= item.price;

  if (item.type === "consumable") {
    if (!appState.inventory) appState.inventory = { shield: 0, extraTime: 0, eliminateWrong: 0, revive: 0 };
    appState.inventory[item.stockVar] = (appState.inventory[item.stockVar] || 0) + 1;
  } else if (item.type === "skin") {
    if (!appState.ownedSkins) appState.ownedSkins = ["cyber-academic"];
    if (!appState.ownedSkins.includes(item.skinId)) {
      appState.ownedSkins.push(item.skinId);
    }
    equipSkin(item.skinId);
  } else if (item.type === "title") {
    if (!appState.ownedTitles) appState.ownedTitles = [];
    if (!appState.ownedTitles.includes(item.titleText)) {
      appState.ownedTitles.push(item.titleText);
    }
    equipTitle(item.titleText);
  }

  saveState();
  updateTopbar();
  showCoinAnimation();
  showToast(`✅ 成功购买 ${item.name}！`);

  // Re-render shop
  refreshShopUI();
}

function equipSkin(skinId) {
  appState.equippedSkin = skinId;
  applySkin(skinId);
  saveState();
  showToast(`🎨 已装备皮肤: ${skinId}`);
}

function equipTitle(titleText) {
  appState.equippedTitle = titleText;
  saveState();
  updateTopbar();
  showToast(`🏷️ 已装备称号: ${titleText}`);
}

  const equippedTitle = appState.equippedTitle || null;

    if (shopActiveTab === "consumable") return i.type === "consumable";
    if (shopActiveTab === "skin") return i.type === "skin";
    if (shopActiveTab === "title") return i.type === "title";
    return true;
  });

  let html = `<div class="list-page" style="animation:fadeIn 0.4s ease;">
    <div class="shop-header">
      <h2>🏪 商店</h2>
      <span class="shop-balance">💰 余额: ${appState.sharedCoins}</span>

        {key:"consumable", label:"道具"},
        {key:"skin", label:"皮肤"},
        {key:"title", label:"称号"}

        <button class="shop-tab${shopActiveTab === t.key ? ' active' : ''}" onclick="shopActiveTab='${t.key}';refreshShopUI();">${t.label}</button>
      `).join("")}
    </div>

    <div class="shop-grid">`;

  filteredItems.forEach(item => {
    let owned = false;
    let actionHTML = '';
    let equipped = false;

    if (item.type === "consumable") {
      // always buyable
      if (appState.sharedCoins >= item.price) {
        actionHTML = `<button class="btn btn-primary btn-sm" onclick="buyShopItem('${item.id}')">🪙 购买</button>`;
      } else {
        actionHTML = `<button class="btn btn-sm" style="background:var(--bg-primary);color:var(--text-muted);cursor:not-allowed;border:1px solid rgba(255,255,255,0.08);">余额不足</button>`;
      }
    } else if (item.type === "skin") {
      owned = ownedSkins.includes(item.skinId);
      equipped = equippedSkin === item.skinId;
      if (owned) {
        if (equipped) {
          actionHTML = `<span class="si-owned">✅ 使用中</span>`;
        } else {
          actionHTML = `<button class="btn btn-cyan btn-sm" onclick="equipSkin('${item.skinId}')">装备</button>`;
        }
      } else {
        if (appState.sharedCoins >= item.price) {
          actionHTML = `<button class="btn btn-primary btn-sm" onclick="buyShopItem('${item.id}')">🪙 购买</button>`;
        } else {
          actionHTML = `<button class="btn btn-sm" style="background:var(--bg-primary);color:var(--text-muted);cursor:not-allowed;border:1px solid rgba(255,255,255,0.08);">余额不足</button>`;
        }
      }
    } else if (item.type === "title") {
      owned = ownedTitles.includes(item.titleText);
      equipped = equippedTitle === item.titleText;
      if (owned) {
        if (equipped) {
          actionHTML = `<span class="si-owned">✅ 使用中</span>`;
        } else {
          actionHTML = `<button class="btn btn-cyan btn-sm" onclick="equipTitle('${item.titleText}')">装备</button>`;
        }
      } else {
        if (appState.sharedCoins >= item.price) {
          actionHTML = `<button class="btn btn-primary btn-sm" onclick="buyShopItem('${item.id}')">🪙 购买</button>`;
        } else {
          actionHTML = `<button class="btn btn-sm" style="background:var(--bg-primary);color:var(--text-muted);cursor:not-allowed;border:1px solid rgba(255,255,255,0.08);">余额不足</button>`;
        }
      }
    }

    let ownedBadge = '';
    if (owned && !equipped) {
      ownedBadge = `<span class="si-owned" style="display:block;">✅ 已拥有</span>`;
    } else if (owned && equipped) {
      ownedBadge = '';
    }

    html += `

        <div class="si-name">${item.name}</div>
        <div class="si-desc">${item.desc}</div>
        <div class="si-price">🪙 ${item.price}</div>

  });

  if (filteredItems.length === 0) {
    html += `<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">暂无商品</p>`;
  }

  html += `</div></div>`;
  return html;  // Return HTML string, caller sets DOM
}

          {page:"favorites",icon:"⭐",label:"收藏夹"},
          {page:"achievements",icon:"🏆",label:"成就墙"},
          {page:"dashboard",icon:"📊",label:"数据看板"},
          {page:"exam",icon:"🏁",label:"模拟考试"},
          {page:"shop",icon:"🏪",label:"商店"},
          {page:"settings",icon:"⚙️",label:"设置"}

            ${item.icon} ${item.label}

      </div>
    </div>`;
  overlay.onclick = function(e) { if (e.target === overlay) closeModal(); };
  document.body.appendChild(overlay);
}

function closeModal() {
  const overlay = document.querySelector(".modal-overlay");
  if (overlay) overlay.remove();
}
